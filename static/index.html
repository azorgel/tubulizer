<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tubulizer</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #070710;
      --bg-card:   #0d0d1f;
      --bg-card2:  #10101e;
      --border:    rgba(180, 79, 255, 0.18);
      --border-hi: rgba(0, 229, 255, 0.3);
      --purple:    #b44fff;
      --cyan:      #00e5ff;
      --red:       #ff003c;
      --text:      #e8e8f0;
      --muted:     #7070a0;
      --radius:    14px;
    }

    html { font-size: 16px; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
      position: relative;
    }

    /* ── Background grid ── */
    .bg-grid {
      position: fixed; inset: 0; z-index: 0; pointer-events: none;
      background-image:
        linear-gradient(rgba(180,79,255,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(180,79,255,0.04) 1px, transparent 1px);
      background-size: 44px 44px;
    }

    .scanlines {
      position: fixed; inset: 0; z-index: 0; pointer-events: none;
      background: repeating-linear-gradient(
        to bottom,
        transparent,
        transparent 2px,
        rgba(0,0,0,0.12) 2px,
        rgba(0,0,0,0.12) 4px
      );
      animation: scanMove 8s linear infinite;
    }
    @keyframes scanMove {
      from { background-position: 0 0; }
      to   { background-position: 0 400px; }
    }

    /* ── Layout ── */
    main {
      position: relative; z-index: 1;
      max-width: 720px;
      margin: 0 auto;
      padding: 48px 24px 80px;
    }

    /* ── Header ── */
    header { text-align: center; margin-bottom: 40px; }

    .logo-wrap {
      display: inline-flex; align-items: center; gap: 18px;
      margin-bottom: 16px;
    }

    .logo-icon { width: 72px; height: 54px; filter: drop-shadow(0 0 16px rgba(180,79,255,0.5)); }

    .logo-text {
      display: flex; flex-direction: column; align-items: flex-start;
    }

    .logo-main {
      font-size: 2.6rem; font-weight: 900; letter-spacing: 0.12em;
      background: linear-gradient(135deg, var(--purple) 0%, var(--cyan) 60%, var(--purple) 100%);
      background-size: 200% 200%;
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: gradShift 4s ease infinite;
      line-height: 1;
    }
    @keyframes gradShift {
      0%   { background-position: 0% 50%; }
      50%  { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    .logo-sub {
      font-size: 0.62rem; letter-spacing: 0.32em; color: var(--muted);
      text-transform: uppercase; font-weight: 600; margin-top: 4px;
    }

    .tagline {
      color: var(--muted); font-size: 0.95rem; letter-spacing: 0.02em;
    }

    /* ── Cards ── */
    .card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px;
      margin-bottom: 16px;
      backdrop-filter: blur(6px);
      box-shadow: 0 4px 40px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.04);
      transition: border-color 0.3s;
    }
    .card:hover { border-color: var(--border-hi); }

    /* ── Input row ── */
    .input-row { display: flex; gap: 10px; }

    .url-input-wrap {
      flex: 1; display: flex; align-items: center;
      background: rgba(0,0,0,0.35);
      border: 1px solid rgba(180,79,255,0.2);
      border-radius: 10px;
      padding: 0 12px;
      transition: border-color 0.25s, box-shadow 0.25s;
    }
    .url-input-wrap:focus-within {
      border-color: var(--purple);
      box-shadow: 0 0 0 3px rgba(180,79,255,0.12);
    }

    .url-icon { color: var(--purple); display: flex; align-items: center; flex-shrink: 0; margin-right: 8px; }

    #urlInput {
      flex: 1; background: transparent; border: none; outline: none;
      color: var(--text); font-size: 0.92rem; padding: 13px 0;
      font-family: "SF Mono", "Fira Code", monospace;
    }
    #urlInput::placeholder { color: var(--muted); }

    .clear-btn {
      background: none; border: none; cursor: pointer;
      color: var(--muted); display: flex; align-items: center;
      padding: 4px; border-radius: 4px; transition: color 0.2s;
    }
    .clear-btn:hover { color: var(--red); }

    /* ── Buttons ── */
    .btn {
      display: inline-flex; align-items: center; gap: 8px;
      border: none; cursor: pointer; font-weight: 700;
      letter-spacing: 0.04em; border-radius: 10px;
      font-size: 0.88rem; transition: all 0.2s; white-space: nowrap;
      position: relative; overflow: hidden;
    }
    .btn::after {
      content: ""; position: absolute; inset: 0;
      background: rgba(255,255,255,0); transition: background 0.2s;
    }
    .btn:hover::after { background: rgba(255,255,255,0.07); }
    .btn:active { transform: scale(0.97); }

    .btn-icon { flex-shrink: 0; }

    .btn-primary {
      background: linear-gradient(135deg, var(--purple), #7b2fff);
      color: #fff; padding: 12px 22px;
      box-shadow: 0 4px 20px rgba(180,79,255,0.35);
    }
    .btn-primary:hover { box-shadow: 0 4px 28px rgba(180,79,255,0.55); }

    .btn-download {
      width: 100%; justify-content: center;
      background: linear-gradient(135deg, var(--cyan) 0%, #0090b8 100%);
      color: #000; padding: 14px 22px; margin-top: 16px;
      font-size: 0.95rem; box-shadow: 0 4px 20px rgba(0,229,255,0.25);
    }
    .btn-download:hover:not(:disabled) { box-shadow: 0 4px 32px rgba(0,229,255,0.45); }
    .btn-download:disabled { opacity: 0.35; cursor: not-allowed; }

    /* ── Loading ── */
    .loading-state {
      display: flex; align-items: center; justify-content: center;
      gap: 12px; padding: 24px; color: var(--muted); font-size: 0.9rem;
    }
    .spinner {
      width: 28px; height: 28px; flex-shrink: 0;
      border: 3px solid rgba(180,79,255,0.2);
      border-top-color: var(--purple);
      border-radius: 50%;
      animation: spin 0.9s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Error ── */
    .error-state {
      display: flex; align-items: center; gap: 10px;
      background: rgba(255,0,60,0.08); border: 1px solid rgba(255,0,60,0.25);
      border-radius: var(--radius); padding: 14px 18px;
      color: #ff6680; font-size: 0.88rem; margin-bottom: 16px;
    }

    /* ── Video meta ── */
    .video-meta-card { display: flex; gap: 16px; align-items: flex-start; }

    .thumb-wrap {
      width: 160px; flex-shrink: 0; border-radius: 8px;
      overflow: hidden; position: relative;
      box-shadow: 0 0 20px rgba(0,0,0,0.5);
    }
    .thumb-wrap img { width: 100%; display: block; }
    .thumb-overlay {
      position: absolute; inset: 0;
      background: linear-gradient(135deg, rgba(180,79,255,0.08), rgba(0,229,255,0.05));
    }

    .meta { flex: 1; min-width: 0; }
    .meta h2 {
      font-size: 1rem; font-weight: 700; line-height: 1.4;
      margin-bottom: 12px;
      display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .meta-pills { display: flex; flex-wrap: wrap; gap: 8px; }

    .pill {
      display: inline-flex; align-items: center; gap: 5px;
      padding: 4px 10px; border-radius: 100px; font-size: 0.76rem; font-weight: 600;
      border: 1px solid;
    }
    .pill-uploader { color: var(--purple); border-color: rgba(180,79,255,0.3); background: rgba(180,79,255,0.07); }
    .pill-duration  { color: var(--cyan);   border-color: rgba(0,229,255,0.25);  background: rgba(0,229,255,0.06); }
    .pill-views     { color: #aaa;          border-color: rgba(255,255,255,0.12); background: rgba(255,255,255,0.04); }

    /* ── Formats ── */
    .section-label {
      display: flex; align-items: center; gap: 8px;
      font-size: 0.78rem; font-weight: 700; letter-spacing: 0.1em;
      text-transform: uppercase; color: var(--muted); margin-bottom: 12px;
    }

    .format-list { display: flex; flex-direction: column; gap: 6px; }

    .format-item {
      display: flex; align-items: center; gap: 12px;
      padding: 11px 14px; border-radius: 8px;
      border: 1px solid rgba(255,255,255,0.07);
      background: rgba(255,255,255,0.025);
      cursor: pointer; transition: all 0.2s;
      user-select: none;
    }
    .format-item:hover {
      border-color: rgba(180,79,255,0.3);
      background: rgba(180,79,255,0.06);
    }
    .format-item.selected {
      border-color: var(--purple);
      background: rgba(180,79,255,0.1);
      box-shadow: 0 0 0 1px rgba(180,79,255,0.2);
    }

    .format-radio {
      width: 16px; height: 16px; border-radius: 50%; flex-shrink: 0;
      border: 2px solid rgba(255,255,255,0.2);
      display: flex; align-items: center; justify-content: center;
      transition: border-color 0.2s;
    }
    .format-item.selected .format-radio {
      border-color: var(--purple);
      background: radial-gradient(circle, var(--purple) 5px, transparent 5px);
    }

    .format-badge {
      font-size: 0.7rem; font-weight: 800; letter-spacing: 0.08em;
      padding: 2px 7px; border-radius: 4px; text-transform: uppercase;
    }
    .badge-combined { background: rgba(180,79,255,0.2); color: var(--purple); }
    .badge-video    { background: rgba(0,229,255,0.15);  color: var(--cyan); }
    .badge-audio    { background: rgba(255,200,0,0.15);  color: #ffc800; }

    .format-label { flex: 1; font-size: 0.88rem; font-weight: 500; }
    .format-ext   { font-size: 0.74rem; color: var(--muted); font-family: monospace; }
    .format-size  { font-size: 0.74rem; color: var(--muted); }

    /* ── Download progress ── */
    .download-progress {
      display: flex; flex-direction: column; gap: 10px;
      padding: 20px; text-align: center; color: var(--muted); font-size: 0.88rem;
    }
    .progress-bar-wrap {
      height: 4px; background: rgba(255,255,255,0.08); border-radius: 2px; overflow: hidden;
    }
    .progress-bar-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--purple), var(--cyan));
      border-radius: 2px;
      animation: progressSlide 1.8s ease-in-out infinite;
      transform-origin: left;
    }
    @keyframes progressSlide {
      0%   { width: 0%; margin-left: 0; }
      50%  { width: 60%; margin-left: 20%; }
      100% { width: 0%; margin-left: 100%; }
    }

    /* ── Helpers ── */
    .hidden { display: none !important; }

    /* ── Responsive ── */
    @media (max-width: 520px) {
      .logo-main { font-size: 2rem; }
      .video-meta-card { flex-direction: column; }
      .thumb-wrap { width: 100%; max-height: 180px; }
      .thumb-wrap img { object-fit: cover; max-height: 180px; width: 100%; }
      .input-row { flex-direction: column; }
      .btn-primary { width: 100%; justify-content: center; }
    }
  </style>
</head>
<body>
  <div class="bg-grid"></div>
  <div class="scanlines"></div>

  <main>
    <header>
      <div class="logo-wrap">
        <svg class="logo-icon" viewBox="0 0 80 60" fill="none" xmlns="http://www.w3.org/2000/svg">
          <rect x="4" y="4" width="72" height="52" rx="10" fill="url(#screen)" stroke="url(#border)" stroke-width="2"/>
          <rect x="4" y="4" width="72" height="52" rx="10" fill="url(#screenGlow)" />
          <polygon points="30,18 58,30 30,42" fill="url(#play)"/>
          <ellipse cx="40" cy="30" rx="4" ry="4" fill="none" stroke="url(#pulse)" stroke-width="1.5" opacity="0.6">
            <animate attributeName="rx" values="4;22;4" dur="2.5s" repeatCount="indefinite"/>
            <animate attributeName="ry" values="4;22;4" dur="2.5s" repeatCount="indefinite"/>
            <animate attributeName="opacity" values="0.6;0;0.6" dur="2.5s" repeatCount="indefinite"/>
          </ellipse>
          <defs>
            <linearGradient id="screen" x1="4" y1="4" x2="76" y2="56" gradientUnits="userSpaceOnUse">
              <stop offset="0%" stop-color="#0d0d1a"/>
              <stop offset="100%" stop-color="#0a0a14"/>
            </linearGradient>
            <linearGradient id="border" x1="0" y1="0" x2="80" y2="60" gradientUnits="userSpaceOnUse">
              <stop offset="0%" stop-color="#b44fff"/>
              <stop offset="50%" stop-color="#00e5ff"/>
              <stop offset="100%" stop-color="#ff003c"/>
            </linearGradient>
            <linearGradient id="screenGlow" x1="4" y1="4" x2="76" y2="56" gradientUnits="userSpaceOnUse">
              <stop offset="0%" stop-color="#b44fff" stop-opacity="0.06"/>
              <stop offset="100%" stop-color="#00e5ff" stop-opacity="0.04"/>
            </linearGradient>
            <linearGradient id="play" x1="30" y1="18" x2="58" y2="42" gradientUnits="userSpaceOnUse">
              <stop offset="0%" stop-color="#b44fff"/>
              <stop offset="100%" stop-color="#00e5ff"/>
            </linearGradient>
            <linearGradient id="pulse" x1="0" y1="0" x2="80" y2="60" gradientUnits="userSpaceOnUse">
              <stop offset="0%" stop-color="#b44fff"/>
              <stop offset="100%" stop-color="#00e5ff"/>
            </linearGradient>
          </defs>
        </svg>
        <div class="logo-text">
          <span class="logo-main">TUBULIZER</span>
          <span class="logo-sub">VIDEO EXTRACTOR</span>
        </div>
      </div>
      <p class="tagline">Paste a URL. Pick your format. Grab the video.</p>
    </header>

    <section class="card input-card">
      <div class="input-row">
        <div class="url-input-wrap">
          <span class="url-icon">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/>
              <path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/>
            </svg>
          </span>
          <input id="urlInput" type="text" placeholder="https://youtube.com/watch?v=..." autocomplete="off" spellcheck="false"/>
          <button id="clearBtn" class="clear-btn" title="Clear" style="display:none">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
              <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
            </svg>
          </button>
        </div>
        <button id="fetchBtn" class="btn btn-primary">
          <svg class="btn-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
            <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
          </svg>
          <span>Analyse</span>
        </button>
      </div>
    </section>

    <div id="loadingState" class="loading-state hidden">
      <div class="spinner"></div>
      <span>Fetching video info…</span>
    </div>

    <div id="errorState" class="error-state hidden">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
        <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>
      </svg>
      <span id="errorMsg">Something went wrong.</span>
    </div>

    <section id="resultsSection" class="hidden">
      <div class="card video-meta-card">
        <div class="thumb-wrap">
          <img id="thumbnail" src="" alt="Thumbnail" />
          <div class="thumb-overlay"></div>
        </div>
        <div class="meta">
          <h2 id="videoTitle"></h2>
          <div class="meta-pills">
            <span class="pill pill-uploader">
              <svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor"><path d="M12 12c2.7 0 4.8-2.1 4.8-4.8S14.7 2.4 12 2.4 7.2 4.5 7.2 7.2 9.3 12 12 12zm0 2.4c-3.2 0-9.6 1.6-9.6 4.8v2.4h19.2v-2.4c0-3.2-6.4-4.8-9.6-4.8z"/></svg>
              <span id="uploader"></span>
            </span>
            <span class="pill pill-duration">
              <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg>
              <span id="duration"></span>
            </span>
            <span class="pill pill-views">
              <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
              <span id="viewCount"></span>
            </span>
          </div>
        </div>
      </div>

      <div class="card formats-card">
        <h3 class="section-label">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
          Select Format
        </h3>
        <div id="formatList" class="format-list"></div>
        <button id="downloadBtn" class="btn btn-download" disabled>
          <svg class="btn-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/>
          </svg>
          <span>Download</span>
        </button>
      </div>
    </section>

    <div id="downloadProgress" class="download-progress hidden">
      <div class="progress-bar-wrap">
        <div class="progress-bar-fill"></div>
      </div>
      <span>Preparing download…</span>
    </div>
  </main>

<script>
const urlInput    = document.getElementById('urlInput');
const clearBtn    = document.getElementById('clearBtn');
const fetchBtn    = document.getElementById('fetchBtn');
const downloadBtn = document.getElementById('downloadBtn');

const loadingState      = document.getElementById('loadingState');
const errorState        = document.getElementById('errorState');
const errorMsg          = document.getElementById('errorMsg');
const resultsSection    = document.getElementById('resultsSection');
const downloadProgress  = document.getElementById('downloadProgress');

const thumbnail  = document.getElementById('thumbnail');
const videoTitle = document.getElementById('videoTitle');
const uploader   = document.getElementById('uploader');
const duration   = document.getElementById('duration');
const viewCount  = document.getElementById('viewCount');
const formatList = document.getElementById('formatList');

let currentUrl     = '';
let selectedFormat = null;

// ── Helpers ────────────────────────────────────────────────

function fmtDuration(sec) {
  if (!sec) return '—';
  const h = Math.floor(sec / 3600);
  const m = Math.floor((sec % 3600) / 60);
  const s = sec % 60;
  if (h) return `${h}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
  return `${m}:${String(s).padStart(2,'0')}`;
}

function fmtViews(n) {
  if (!n) return '—';
  if (n >= 1e9) return (n / 1e9).toFixed(1) + 'B views';
  if (n >= 1e6) return (n / 1e6).toFixed(1) + 'M views';
  if (n >= 1e3) return (n / 1e3).toFixed(1) + 'K views';
  return n + ' views';
}

function fmtSize(bytes) {
  if (!bytes) return '';
  if (bytes >= 1e9) return (bytes / 1e9).toFixed(1) + ' GB';
  if (bytes >= 1e6) return (bytes / 1e6).toFixed(1) + ' MB';
  return (bytes / 1e3).toFixed(0) + ' KB';
}

function showError(msg) {
  errorMsg.textContent = msg;
  errorState.classList.remove('hidden');
}

function hideAll() {
  loadingState.classList.add('hidden');
  errorState.classList.add('hidden');
  resultsSection.classList.add('hidden');
  downloadProgress.classList.add('hidden');
}

// ── URL input events ────────────────────────────────────────

urlInput.addEventListener('input', () => {
  clearBtn.style.display = urlInput.value ? 'flex' : 'none';
  errorState.classList.add('hidden');
});

clearBtn.addEventListener('click', () => {
  urlInput.value = '';
  clearBtn.style.display = 'none';
  hideAll();
  selectedFormat = null;
  urlInput.focus();
});

urlInput.addEventListener('keydown', e => {
  if (e.key === 'Enter') fetchInfo();
});

// ── Fetch info ──────────────────────────────────────────────

fetchBtn.addEventListener('click', fetchInfo);

async function fetchInfo() {
  const url = urlInput.value.trim();
  if (!url) { urlInput.focus(); return; }

  currentUrl = url;
  selectedFormat = null;
  hideAll();
  loadingState.classList.remove('hidden');
  fetchBtn.disabled = true;

  try {
    const res = await fetch('/api/info', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ url }),
    });

    const data = await res.json();

    if (!res.ok) {
      throw new Error(data.detail || `Server error ${res.status}`);
    }

    loadingState.classList.add('hidden');
    renderResults(data);

  } catch (err) {
    loadingState.classList.add('hidden');
    showError(err.message || 'Failed to fetch video info.');
  } finally {
    fetchBtn.disabled = false;
  }
}

// ── Render results ──────────────────────────────────────────

function renderResults(data) {
  thumbnail.src = data.thumbnail || '';
  videoTitle.textContent = data.title || 'Unknown title';
  uploader.textContent = data.uploader || 'Unknown';
  duration.textContent = fmtDuration(data.duration);
  viewCount.textContent = fmtViews(data.view_count);

  formatList.innerHTML = '';
  downloadBtn.disabled = true;

  if (!data.formats || data.formats.length === 0) {
    formatList.innerHTML = '<p style="color:var(--muted);font-size:.85rem;padding:8px 0">No downloadable formats found.</p>';
  } else {
    data.formats.forEach(fmt => {
      const item = document.createElement('div');
      item.className = 'format-item';
      item.dataset.id = fmt.id;

      const badgeClass = fmt.kind === 'audio' ? 'badge-audio' : 'badge-video';

      item.innerHTML = `
        <div class="format-radio"></div>
        <span class="format-badge ${badgeClass}">${fmt.kind}</span>
        <span class="format-label">${fmt.label}</span>
      `;

      item.addEventListener('click', () => selectFormat(fmt, item));
      formatList.appendChild(item);
    });
  }

  resultsSection.classList.remove('hidden');
}

function selectFormat(fmt, el) {
  document.querySelectorAll('.format-item').forEach(i => i.classList.remove('selected'));
  el.classList.add('selected');
  selectedFormat = fmt;
  downloadBtn.disabled = false;
}

// ── Download ────────────────────────────────────────────────

downloadBtn.addEventListener('click', startDownload);

async function startDownload() {
  if (!selectedFormat || !currentUrl) return;

  downloadProgress.classList.remove('hidden');
  downloadBtn.disabled = true;
  errorState.classList.add('hidden');

  try {
    const res = await fetch('/api/download', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        url: currentUrl,
        format_id: selectedFormat.id,
      }),
    });

    const data = await res.json();

    if (!res.ok) {
      throw new Error(data.detail || `Download error ${res.status}`);
    }

    // Trigger browser download
    const a = document.createElement('a');
    a.href = data.path;
    a.download = data.filename;
    document.body.appendChild(a);
    a.click();
    a.remove();

    downloadProgress.classList.add('hidden');

  } catch (err) {
    downloadProgress.classList.add('hidden');
    showError(err.message || 'Download failed.');
  } finally {
    downloadBtn.disabled = false;
  }
}
</script>
</body>
</html>
